<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>车辆信息图片生成器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; display: flex; flex-direction: column; }

/* 顶部栏 */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  padding: 12px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.header h1 { font-size: 17px; font-weight: 600; color: #fff; letter-spacing: 1px; }
.header h1 span { color: #e94560; }
.header .ver { font-size: 11px; color: rgba(255,255,255,0.4); }
.btn-header-export {
  padding: 9px 28px;
  background: linear-gradient(135deg, #e94560 0%, #c0392b 100%);
  color: #fff; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; letter-spacing: 1px;
  transition: opacity 0.2s, transform 0.1s;
  box-shadow: 0 2px 8px rgba(233,69,96,0.3);
}
.btn-header-export:hover { opacity: 0.9; }
.btn-header-export:active { transform: scale(0.98); }

/* 主体 */
.main { display: flex; flex: 1; height: calc(100vh - 54px); }

/* 左侧面板 */
.panel {
  width: 360px; min-width: 360px;
  background: #fff;
  border-right: 1px solid #e8e8e8;
  display: flex; flex-direction: column;
}
.panel-header {
  padding: 14px 20px;
  font-size: 14px; font-weight: 600; color: #555;
  background: #fafafa;
  border-bottom: 1px solid #eee;
  display: flex; align-items: center; gap: 8px;
}
.panel-header .dot { width: 6px; height: 6px; border-radius: 50%; background: #e94560; }
.field-list { flex: 1; overflow-y: auto; padding: 16px; }
.field-list::-webkit-scrollbar { width: 4px; }
.field-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* 字段卡片 */
.field-card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field-card:focus-within { border-color: #e94560; box-shadow: 0 0 0 3px rgba(233,69,96,0.1); }
.field-label {
  font-size: 12px; font-weight: 600; color: #888;
  margin-bottom: 8px; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.field-card input[type="text"] {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  font-size: 15px;
  color: #333;
  outline: none;
  background: #fafafa;
  transition: border-color 0.2s, background 0.2s;
}
.field-card input[type="text"]:focus {
  border-color: #e94560;
  background: #fff;
}
.field-card input[type="text"]::placeholder { color: #ccc; }
.field-hint { font-size: 11px; color: #bbb; margin-top: 6px; }

/* 导出按钮 */
.btn-bar { padding: 16px; border-top: 1px solid #eee; }
.btn-export {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #e94560 0%, #c0392b 100%);
  color: #fff; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600;
  cursor: pointer; letter-spacing: 1px;
  transition: opacity 0.2s, transform 0.1s;
  box-shadow: 0 4px 12px rgba(233,69,96,0.3);
}
.btn-export:hover { opacity: 0.9; }
.btn-export:active { transform: scale(0.98); }

/* 右侧画布 */
.canvas-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: auto; background: #e8e8e8;
}
.canvas-wrapper { position: relative; box-shadow: 0 8px 32px rgba(0,0,0,0.18); border-radius: 4px; overflow: hidden; max-width: 100%; }
#bgImage { display: block; user-select: none; -webkit-user-drag: none; max-width: 100%; height: auto; }

/* 文字覆盖层预览 */
.text-overlay {
  position: absolute; white-space: nowrap;
  user-select: none; pointer-events: none;
  z-index: 5;
}
.text-overlay.empty { opacity: 0.25; }

/* 提示 */
.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(0,0,0,0.85); color: #fff;
  padding: 12px 28px; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  opacity: 0; transition: all 0.35s; z-index: 999;
  backdrop-filter: blur(8px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.canvas-hint {
  position: absolute; bottom: 12px; right: 16px;
  font-size: 11px; color: rgba(0,0,0,0.25);
}

/* 手机端适配 */
@media (max-width: 768px) {
  .main { flex-direction: column; height: auto; min-height: calc(100vh - 48px); }
  .panel { width: 100%; min-width: 100%; border-right: none; border-bottom: 1px solid #e8e8e8; }
  .canvas-area { min-height: 50vh; }
  .header { padding: 10px 16px; }
  .header h1 { font-size: 14px; }
  .btn-header-export { padding: 7px 16px; font-size: 12px; }
}

<div class="toast" id="toast"></div>
<canvas id="exportCanvas" style="display:none;"></canvas>

<script>
/* ===== 固定配置 ===== */
var fields = [];
var selectedId = null;
var currentZoom = 1;
var imgNaturalW = 0;
var imgNaturalH = 0;
var scaleRatio = 1;
// 使用内嵌字体，无需区分设备
var CANVAS_FONT = '700 25px "MSYaHeiBold", "Microsoft YaHei", "PingFang SC", sans-serif';
var CANVAS_FONT_VIN = '700 26px "MSYaHeiBold", "Microsoft YaHei", "PingFang SC", sans-serif';

var bgImage = document.getElementById('bgImage');
var wrapper = document.getElementById('canvasWrapper');

/* 图片加载 */
bgImage.onload = function() {
  imgNaturalW = bgImage.naturalWidth;
  imgNaturalH = bgImage.naturalHeight;
  doFitToScreen();
  if (fields.length === 0) loadDefaults();
  renderFieldList();
  renderOverlays();
};

bgImage.onerror = function() {
  document.getElementById('fieldList').innerHTML = '<div style="padding:20px;color:red;text-align:center;">图片加载失败</div>';
};

/* ===== 字段定义（固定参数，不可修改） ===== */
function loadDefaults() {
  fields = [
    { id: 'f_series',  label: '车系', x: 99,  y: 127, text: '', fontSize: 25, color: '#282829', fontFamily: 'Microsoft YaHei', fontWeight: '700' },
    { id: 'f_model',   label: '车型', x: 316, y: 127, text: '', fontSize: 25, color: '#282829', fontFamily: 'Microsoft YaHei', fontWeight: '700', toUpper: true },
    { id: 'f_year',    label: '年款', x: 509, y: 127, text: '', fontSize: 25, color: '#282829', fontFamily: 'Microsoft YaHei', fontWeight: '700' },
    { id: 'f_vin',     label: 'VIN',  x: 908, y: 906, text: '', fontSize: 26, color: '#282829', fontFamily: 'Microsoft YaHei', fontWeight: '700', toUpper: true, onlyAlnum: true, maxLen: 17 }
  ];
  renderFieldList();
}

/* ===== 缩放与适配 ===== */
function doFitToScreen() {
  var area = document.getElementById('canvasArea');
  var maxW = area.clientWidth - 40;
  var maxH = area.clientHeight - 40;
  if (maxW <= 0 || maxH <= 0 || imgNaturalW <= 0) return;
  currentZoom = Math.min(maxW / imgNaturalW, maxH / imgNaturalH, 1);
  applyZoom();
}

function applyZoom() {
  var w = Math.round(imgNaturalW * currentZoom);
  var h = Math.round(imgNaturalH * currentZoom);
  bgImage.style.width = w + 'px';
  bgImage.style.height = h + 'px';
  wrapper.style.width = w + 'px';
  wrapper.style.height = h + 'px';
  scaleRatio = currentZoom;
  renderOverlays();
}

/* ===== 输入处理 ===== */
function onFieldInput(id, el) {
  var f = fields.find(function(f) { return f.id === id; });
  if (!f) return;

  // VIN：仅字母数字，最大17位
  if (f.onlyAlnum) {
    el.value = el.value.replace(/[^a-zA-Z0-9]/g, '').slice(0, f.maxLen);
  }
  // 自动转大写
  if (f.toUpper) {
    el.value = el.value.toUpperCase();
  }

  f.text = el.value;
  renderOverlays();
}

/* ===== HTML转义 ===== */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ===== 渲染左侧字段列表 ===== */
function renderFieldList() {
  var list = document.getElementById('fieldList');
  var html = '';
  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    html += '<div class="field-card">';
    html += '<div class="field-label">' + escHtml(f.label) + '</div>';
    html += '<input type="text" value="' + escHtml(f.text) + '" placeholder="请输入' + escHtml(f.label) + '..."';
    if (f.onlyAlnum) html += ' maxlength="' + f.maxLen + '"';
    if (f.toUpper) html += ' style="text-transform:uppercase;"';
    html += ' oninput="onFieldInput(\'' + f.id + '\', this)">';
    if (f.onlyAlnum) {
      html += '<div class="field-hint">仅限字母和数字，最多 ' + f.maxLen + ' 位</div>';
    }
    html += '</div>';
  }
  list.innerHTML = html;
}

/* ===== 渲染画布覆盖层 ===== */
function renderOverlays() {
  var old = wrapper.querySelectorAll('.text-overlay');
  for (var i = 0; i < old.length; i++) old[i].remove();

  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    var div = document.createElement('div');
    div.className = 'text-overlay' + (!f.text ? ' empty' : '');
    div.style.left = (f.x * scaleRatio) + 'px';
    div.style.top = (f.y * scaleRatio) + 'px';
    div.style.fontSize = (f.fontSize * scaleRatio) + 'px';
    div.style.color = f.color;
    div.style.fontFamily = '"' + f.fontFamily + '", "PingFang SC", "Noto Sans SC", Arial, sans-serif';
    div.style.fontWeight = f.fontWeight;
    div.textContent = f.text || f.label;
    wrapper.appendChild(div);
  }
}

/* ===== 导出图片 ===== */
function exportImage() {
  if (!imgNaturalW) { showToast('图片未加载'); return; }

  // 获取VIN文字作为文件名
  var vinField = fields.find(function(f) { return f.label === 'VIN'; });
  var vinText = vinField ? vinField.text : '';

  // 检查是否有空字段
  var empty = [];
  for (var i = 0; i < fields.length; i++) {
    if (!fields[i].text) empty.push(fields[i].label);
  }
  if (empty.length > 0) {
    showToast('请填写：' + empty.join('、'));
    return;
  }

  var canvas = document.getElementById('exportCanvas');
  canvas.width = imgNaturalW;
  canvas.height = imgNaturalH;
  var ctx = canvas.getContext('2d');

  // 绘制底图（原始分辨率）
  ctx.drawImage(bgImage, 0, 0, imgNaturalW, imgNaturalH);

  // 绘制文字（原始像素坐标）
  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    // 手机端 Y 坐标微调补偿（手机字体渲染基准线不同）
    var offsetY = 0; // 使用内嵌字体，无需补偿
    ctx.font = (f.id === 'f_vin') ? CANVAS_FONT_VIN : CANVAS_FONT;
    ctx.fillStyle = f.color;
    ctx.textBaseline = 'top';
    ctx.fillText(f.text, f.x, f.y + offsetY);
  }

  // 导出：将 canvas 转为 data URL，通过导航触发下载
  try {
    var dataUrl = canvas.toDataURL('image/png');
    var link = document.createElement('a');
    link.href = dataUrl;
    link.download = vinText || '车辆信息_' + Date.now();
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast('✅ 图片已导出！');
  } catch(e) {
    // 备用方案：新窗口打开图片（用户可右键另存为）
    try {
      var dataUrl2 = canvas.toDataURL('image/png');
      var win = window.open();
      if (win) {
        win.document.write('<html><head><title>图片已生成</title></head><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;"><img src="' + dataUrl2 + '" style="max-width:100%;max-height:100vh;"></body></html>');
        win.document.title = '右键图片 → 另存为 即可保存';
        showToast('已在新窗口打开，右键图片另存为');
      } else {
        showToast('弹出窗口被拦截，请允许弹出窗口');
      }
    } catch(e2) {
      showToast('导出失败：' + e2.message);
    }
  }
}

/* ===== 提示 ===== */
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

/* ===== 窗口缩放适配 ===== */
window.addEventListener('resize', function() { if (imgNaturalW) doFitToScreen(); });
</script>
